name: release

# Tag-driven release: pushing a `v*` tag (e.g. `v0.1.0`) triggers a build
# matrix that produces archives for every supported platform and uploads
# them to a GitHub Release with a checksum manifest.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Capture the ldflags values once so the build step stays a one-liner.
      - name: derive build metadata
        id: meta
        run: |
          version="${GITHUB_REF_NAME}"
          commit="${GITHUB_SHA}"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "version=$version"
            echo "commit=$commit"
            echo "date=$date"
          } >> "$GITHUB_OUTPUT"

      - name: build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ steps.meta.outputs.commit }}
          DATE: ${{ steps.meta.outputs.date }}
        run: |
          set -euo pipefail
          binary=extend
          if [ "$GOOS" = "windows" ]; then
            binary=extend.exe
          fi
          mkdir -p dist
          go build -trimpath \
            -ldflags "-s -w \
              -X github.com/extend-hq/extend-cli/internal/version.Version=$VERSION \
              -X github.com/extend-hq/extend-cli/internal/version.Commit=$COMMIT \
              -X github.com/extend-hq/extend-cli/internal/version.Date=$DATE" \
            -o "dist/$binary" \
            ./cmd/extend

      # Sign and notarize Mac binaries with Apple's Developer ID and notary
      # service. Uses anchore/quill so it runs on the Linux runner without
      # needing to spin up a macOS runner. The bare binary is what gets
      # signed; the .tar.gz wrapper is created in the next step.
      - name: install quill
        if: matrix.goos == 'darwin'
        run: |
          curl -sSfL https://get.anchore.io/quill | sudo sh -s -- -b /usr/local/bin v0.7.1
          quill version

      - name: sign and notarize macOS binary
        if: matrix.goos == 'darwin'
        env:
          QUILL_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          QUILL_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          QUILL_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          QUILL_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          QUILL_NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          quill sign-and-notarize dist/extend
          quill describe dist/extend | head -40

      - name: package archive
        id: pkg
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          stem="extend_${VERSION}_${GOOS}_${GOARCH}"
          cd dist
          if [ "$GOOS" = "windows" ]; then
            archive="${stem}.zip"
            zip -q "$archive" extend.exe
            rm extend.exe
          else
            archive="${stem}.tar.gz"
            tar -czf "$archive" extend
            rm extend
          fi
          # Per-archive checksum for the aggregated SHA256SUMS file.
          sha256sum "$archive" > "${archive}.sha256"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: upload archive
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.pkg.outputs.archive }}
          path: |
            dist/${{ steps.pkg.outputs.archive }}
            dist/${{ steps.pkg.outputs.archive }}.sha256
          retention-days: 7

  release:
    name: github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: stage release files
        run: |
          set -euo pipefail
          mkdir -p release
          # Each artifact directory contains the archive plus its per-archive
          # .sha256 sidecar. Move just the archives into release/, then build
          # a single SHA256SUMS file across all of them.
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release/ \;
          cd release
          # Guard against a silent empty release if the upload/download
          # contract changes underfoot. Update the threshold if the build
          # matrix changes.
          archive_count=$(ls -1 extend_* 2>/dev/null | wc -l)
          if [ "$archive_count" -lt 5 ]; then
            echo "::error::Expected at least 5 platform archives, found $archive_count"
            ls -la
            exit 1
          fi
          sha256sum extend_* > SHA256SUMS

      - name: create github release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  npm-publish:
    name: npm publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for npm provenance
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6

      - name: configure npm auth
        run: npm config set //registry.npmjs.org/:_authToken ${NPM_TOKEN}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: extract binaries from archives
        run: |
          set -euo pipefail
          mkdir -p binaries
          for dir in artifacts/*/; do
            archive=$(find "$dir" -maxdepth 1 -type f \( -name "*.tar.gz" -o -name "*.zip" \) | head -1)
            if [ -z "$archive" ]; then continue; fi
            stem=$(basename "$archive" | sed -E 's/\.(tar\.gz|zip)$//')
            mkdir -p "binaries/$stem"
            case "$archive" in
              *.tar.gz) tar -xzf "$archive" -C "binaries/$stem" ;;
              *.zip)    unzip -q "$archive" -d "binaries/$stem" ;;
            esac
          done
          ls binaries/

      - name: derive npm version
        id: ver
        run: |
          # Strip leading 'v' from the tag for semver.
          v="${GITHUB_REF_NAME#v}"
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: publish platform packages
        env:
          AUTHORIZED: "1"   # guard against accidental local publishes
          VERSION: ${{ steps.ver.outputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Map: GOOS:GOARCH:NODE_OS:NODE_CPU:BIN_NAME
          # Node.js process.platform uses 'win32', not 'windows', and
          # process.arch uses 'x64', not 'amd64'. Sub-package names follow
          # the Node convention.
          for entry in \
            "linux:amd64:linux:x64:extend" \
            "linux:arm64:linux:arm64:extend" \
            "darwin:amd64:darwin:x64:extend" \
            "darwin:arm64:darwin:arm64:extend" \
            "windows:amd64:win32:x64:extend.exe"
          do
            IFS=':' read -r goos goarch node_os node_cpu bin_name <<< "$entry"
            pkg="@extend-ai/cli-${node_os}-${node_cpu}"
            stem="extend_${REF_NAME}_${goos}_${goarch}"
            src_dir="binaries/$stem"
            if [ ! -d "$src_dir" ]; then
              echo "::error::Missing binary directory $src_dir"
              exit 1
            fi

            tmp=$(mktemp -d)
            mkdir -p "$tmp/bin"
            cp "$src_dir/$bin_name" "$tmp/bin/$bin_name"
            chmod +x "$tmp/bin/$bin_name"

            cat > "$tmp/package.json" <<EOF
          {
            "name": "$pkg",
            "version": "$VERSION",
            "description": "Native binary for @extend-ai/cli (${node_os}-${node_cpu})",
            "homepage": "https://github.com/extend-hq/extend-cli",
            "repository": {
              "type": "git",
              "url": "git+https://github.com/extend-hq/extend-cli.git"
            },
            "license": "Apache-2.0",
            "os": ["$node_os"],
            "cpu": ["$node_cpu"]
          }
          EOF

            # Idempotency: skip if this version is already on the registry.
            # Lets the job be safely re-run after a partial failure.
            if [ -n "$(npm view "$pkg@$VERSION" version 2>/dev/null)" ]; then
              echo "$pkg@$VERSION already published, skipping"
            else
              # Use latest npm to ensure OIDC/provenance support.
              (cd "$tmp" && npx -y npm@latest publish --access public --provenance)
            fi
          done

      - name: stage and publish wrapper package
        env:
          AUTHORIZED: "1"
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # Wrapper package source lives in npm/cli/. Source-of-truth name
          # in package.json is @extend-ai/cli; the version + optionalDeps
          # are templated in here from the release tag.
          if [ -n "$(npm view "@extend-ai/cli@$VERSION" version 2>/dev/null)" ]; then
            echo "@extend-ai/cli@$VERSION already published, skipping"
            exit 0
          fi
          tmp=$(mktemp -d)
          cp -r npm/cli/. "$tmp/"
          (cd "$tmp" && node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            for (const dep of Object.keys(pkg.optionalDependencies)) {
              pkg.optionalDependencies[dep] = process.env.VERSION;
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          ")
          (cd "$tmp" && npx -y npm@latest publish --access public --provenance)

  homebrew-publish:
    name: homebrew formula update
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: derive version and sha256s
        id: meta
        run: |
          set -euo pipefail
          v="${GITHUB_REF_NAME#v}"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          for goos in darwin linux; do
            for goarch in amd64 arm64; do
              archive="extend_v${v}_${goos}_${goarch}.tar.gz"
              sha=$(awk '{print $1}' "artifacts/${archive}/${archive}.sha256")
              echo "sha_${goos}_${goarch}=${sha}" >> "$GITHUB_OUTPUT"
            done
          done

      - name: checkout tap
        uses: actions/checkout@v6
        with:
          repository: extend-hq/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: generate and push formula
        env:
          REF_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.meta.outputs.version }}
          SHA_DARWIN_AMD64: ${{ steps.meta.outputs.sha_darwin_amd64 }}
          SHA_DARWIN_ARM64: ${{ steps.meta.outputs.sha_darwin_arm64 }}
          SHA_LINUX_AMD64: ${{ steps.meta.outputs.sha_linux_amd64 }}
          SHA_LINUX_ARM64: ${{ steps.meta.outputs.sha_linux_arm64 }}
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          cat > tap/Formula/extend.rb <<RUBY
          # Auto-generated by the extend-hq/extend-cli release workflow on tag
          # ${REF_NAME}. Do not edit by hand; changes will be overwritten on the
          # next release.
          class Extend < Formula
            desc "Command-line interface for Extend"
            homepage "https://extend.ai"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/extend-hq/extend-cli/releases/download/${REF_NAME}/extend_${REF_NAME}_darwin_arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/extend-hq/extend-cli/releases/download/${REF_NAME}/extend_${REF_NAME}_darwin_amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/extend-hq/extend-cli/releases/download/${REF_NAME}/extend_${REF_NAME}_linux_arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/extend-hq/extend-cli/releases/download/${REF_NAME}/extend_${REF_NAME}_linux_amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "extend"
            end

            test do
              system "#{bin}/extend", "--version"
            end
          end
          RUBY

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/extend.rb
          if git diff --cached --quiet; then
            echo "no formula changes for ${REF_NAME}"
            exit 0
          fi
          git commit -m "extend ${REF_NAME}"
          git push
